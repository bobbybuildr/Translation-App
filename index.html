<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="index.css">

    <title>Translator App</title>
</head>
<body>
    <header>
        <div class="header-container">
            <img class="parrot-logo" src="assets/parrot.png" alt="PollyGlot Parrot Logo">
            <div class="header-text">
                <h1 class="title">PollyGlot</h1>
                <h2 class="tagline">Perfect Translation Every Time</h2>
            </div>
        </div>
    </header>
    <main>
        <div class="main-container">
            <div id="chat-window" class="chat-window" aria-live="polite">
                <div class="assistant-chat">
                    Select the languaage you wish me to translate into, type your text and hit send!
                </div>
            </div>
            <form class="text-form">
                <textarea name="text-box" id="text-box"></textarea>
                <button id="submit-btn" type="submit" aria-label="submit text to translate"><img src="assets/send-btn.png" alt=""></button>
            </form>
            <div class="flags-container">
                <label class="flag-option">
                    <input type="radio" name="language" value="french" checked>
                    <img src="assets/fr-flag.png" alt="French">
                </label>
                <label class="flag-option">
                    <input type="radio" name="language" value="spanish">
                    <img src="assets/sp-flag.png" alt="Spanish">
                </label>
                <label class="flag-option">
                    <input type="radio" name="language" value="japanese">
                    <img src="assets/jpn-flag.png" alt="Japanese">
                </label>
            </div>
        </div>
    </main>
    <script src="index.js" type="module"></script>
</body>
</html>
